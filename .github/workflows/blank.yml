name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.distro }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: arch
            dockerfile: ci/Dockerfile.arch
          - distro: ubuntu
            dockerfile: ci/Dockerfile.ubuntu
          - distro: fedora
            dockerfile: ci/Dockerfile.fedora
          - distro: opensuse
            dockerfile: ci/Dockerfile.opensuse
          - distro: debian
            dockerfile: ci/Dockerfile.debian

    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.distro }} image
        run: docker build -f ${{ matrix.dockerfile }} -t devenv-${{ matrix.distro }} .

      - name: Run devenv.sh on ${{ matrix.distro }}
        run: |
          docker run --rm \
            -e CI=true \
            devenv-${{ matrix.distro }} \
            bash -c "cd /app && bash devenv.sh --ci"
